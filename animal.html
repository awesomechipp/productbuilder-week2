<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나는 강아지상? 고양이상? 🐾</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animal.css">
    <meta name="google-adsense-account" content="ca-pub-9054035242950134">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9054035242950134" crossorigin="anonymous"></script>
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="nav-btn">💕 MBTI 궁합 보기</a>
        <a href="animal.html" class="nav-btn active">🐾 동물상 테스트</a>
    </nav>
    <div class="container">
        <header>
            <div class="header-icon">🐾</div>
            <h1>나는 <span>강아지상</span>? <span>고양이상</span>?</h1>
            <p>AI가 당신의 얼굴을 분석해 동물상을 알려드려요</p>
        </header>

        <div class="upload-section">
            <label for="file-input" class="upload-box" id="upload-box">
                <div class="upload-icon">📁</div>
                <div class="upload-text">사진을 클릭하거나<br>드래그해서 업로드하세요</div>
                <div class="upload-hint">JPG, PNG 등 이미지 파일</div>
                <input type="file" id="file-input" accept="image/*" style="display:none;">
            </label>

            <div class="preview-box" id="preview-box" style="display:none;">
                <img id="preview-img" src="" alt="업로드된 사진">
                <button class="reupload-btn" id="reupload-btn">다시 선택 🔄</button>
            </div>

            <button id="analyze-btn" style="display:none;" onclick="analyze()">분석하기 🔍</button>
        </div>

        <div class="result-box" id="result-box" style="display:none;">
            <div class="result-title">✨ 분석 결과</div>
            <div id="label-container"></div>
            <div class="verdict" id="verdict"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="animal.js"></script>
</body>
</html>
