<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <div class="theme-toggle">
            <button id="theme-btn" aria-label="테마 전환">☀️</button>
        </div>
        <header>
            <h1>Lotto <span>Generator</span></h1>
            <p>행운의 숫자를 확인해보세요!</p>
        </header>

        <div class="display-section">
            <div id="numbers-display">
                <div class="placeholder">번호 생성 버튼을 눌러주세요</div>
            </div>
        </div>

        <div class="action-section">
            <button id="generate-btn">번호 생성하기</button>
        </div>
        
        <div class="history-section">
            <h3>최근 생성 이력</h3>
            <ul id="history-list"></ul>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
