<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 애정 궁합</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="animal.html" class="animal-test-btn">🐾 동물상 테스트</a>
    <div class="glass-container">
        <button id="theme-btn" class="theme-btn" aria-label="테마 전환">🌙</button>
        <header>
            <div class="header-icon">💕</div>
            <h1>MBTI <span>애정 궁합</span></h1>
            <p>두 MBTI의 사랑 궁합을 확인해보세요</p>
        </header>

        <div class="selector-section">
            <div class="selector-box">
                <label>나의 MBTI</label>
                <div class="type-badge" id="my-badge">?</div>
                <select id="my-mbti">
                    <option value="">선택하세요</option>
                </select>
                <p class="type-desc" id="my-desc"></p>
            </div>

            <div class="heart-divider">
                <div class="divider-heart">💗</div>
            </div>

            <div class="selector-box">
                <label>상대방의 MBTI</label>
                <div class="type-badge" id="partner-badge">?</div>
                <select id="partner-mbti">
                    <option value="">선택하세요</option>
                </select>
                <p class="type-desc" id="partner-desc"></p>
            </div>
        </div>

        <button id="check-btn">궁합 확인하기 ✨</button>

        <div class="result-section" id="result">
            <div class="result-pair" id="result-pair"></div>
            <div class="hearts-display" id="hearts-display"></div>
            <div class="result-badge" id="result-badge"></div>
            <p class="result-desc" id="result-desc"></p>
            <div class="detail-grid">
                <div class="detail-card strengths-card">
                    <h4>💚 강점</h4>
                    <ul id="strengths-list"></ul>
                </div>
                <div class="detail-card challenges-card">
                    <h4>⚡ 주의점</h4>
                    <ul id="challenges-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- 제휴 문의 폼 -->
    <div class="glass-container partnership-container">
        <header>
            <div class="header-icon">🤝</div>
            <h1>제휴 <span>문의</span></h1>
            <p>비즈니스 제휴 및 협업 문의를 남겨주세요</p>
        </header>

        <form class="partnership-form" action="https://formspree.io/f/xlgoredb" method="POST">
            <div class="form-group">
                <label for="company">회사명 / 이름</label>
                <input type="text" id="company" name="company" placeholder="회사명 또는 이름을 입력하세요" required>
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="답변받으실 이메일을 입력하세요" required>
            </div>
            <div class="form-group">
                <label for="category">문의 유형</label>
                <select id="category" name="category" required>
                    <option value="">선택하세요</option>
                    <option value="광고/마케팅">광고 / 마케팅</option>
                    <option value="콘텐츠 제휴">콘텐츠 제휴</option>
                    <option value="기술 협업">기술 협업</option>
                    <option value="투자/IR">투자 / IR</option>
                    <option value="기타">기타</option>
                </select>
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="5" placeholder="제휴 목적 및 문의 내용을 자유롭게 작성해주세요" required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의 보내기 ✉️</button>
        </form>
    </div>

    <!-- 댓글 -->
    <div class="glass-container disqus-container">
        <header>
            <div class="header-icon">💬</div>
            <h1>댓글 <span>남기기</span></h1>
        </header>
        <div id="disqus_thread"></div>
        <script>
            (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://https-productbuilder-week2-pages-dev.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <script src="main.js"></script>
</body>
</html>
